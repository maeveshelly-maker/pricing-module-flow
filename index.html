<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Reserv — Pricing Module Flow (V1)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f8f8f8; font-family: system-ui, -apple-system, sans-serif; padding: 24px; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  p.sub { color: #6b7280; font-size: 13px; margin-bottom: 20px; }

<body>

<p class="sub">Products &amp; Price Books, no CPQ · Proposal/RFP stage gate · Updated July 2026</p>
<div class="wrap">

  <line x1="470" y1="68" x2="500" y2="68" stroke="#999" stroke-width="2" marker-end="url(#a)"/>

  <circle cx="782" cy="582" r="5" fill="#0d9488"/>

  <polygon points="900,668 985,710 900,752 815,710" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="900" y="706" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Approved?</text>
  <text x="900" y="721" text-anchor="middle" font-size="8" fill="#b45309">Nick or Martha decides</text>
  <circle cx="900" cy="676" r="5" fill="#7c3aed"/>

  <path d="M815,710 L370,710 L370,626" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
  <text x="550" y="701" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">approved</text>

  <path d="M985,710 L1050,710 L1050,368 L775,368" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ar)"/>
  <text x="1058" y="450" text-anchor="start" font-size="10" font-weight="600" fill="#dc2626">↻ no: rep revises</text>
  <text x="1058" y="463" text-anchor="start" font-size="10" font-weight="600" fill="#dc2626">&amp; resubmits</text>

  <!-- ════ LEGEND (in-canvas) ════ -->
  <rect x="1090" y="530" width="340" height="140" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="1104" y="548" font-size="10" font-weight="700" fill="#374151">Who owns each step</text>
  <circle cx="1104" cy="564" r="5" fill="#2563eb"/>
  <text x="1118" y="567" font-size="9" fill="#374151">BD rep — happens per deal</text>
  <circle cx="1104" cy="584" r="5" fill="#4b5563"/>
  <text x="1118" y="587" font-size="9" fill="#374151">RevOps / Commercial — one-time per carrier</text>
  <circle cx="1104" cy="604" r="5" fill="#0d9488"/>
  <text x="1118" y="607" font-size="9" fill="#374151">Automated — no human involved</text>
  <circle cx="1104" cy="624" r="5" fill="#7c3aed"/>
  <text x="1118" y="627" font-size="9" fill="#374151">Nick or Martha — decides on flagged deals</text>
